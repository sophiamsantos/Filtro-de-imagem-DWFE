<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS - Imagem - Cartão Texto na Frente da Imagem</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <div class="cartao">
        <div class="painel">
            <img class="imagem" src="imagem/PampulhaPortinari.jpg" alt="Igreja da Pampulha - Belo Horizonte">
            <div class="sobreposicao">
                <h1>Igreja da Pampulha</h1>
                <p class="localizacao">
                    Belo Horizonte, MG
                </p>
            </div>
        </div>
    </div>
</body>
</html>
